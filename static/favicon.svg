<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Page body -->
  <rect x="4" y="2" width="20" height="26" rx="2" ry="2"
        fill="#5C6BC0"/>
  <!-- Folded corner (top-right) -->
  <path d="M18 2 L24 2 L24 8 Z" fill="#3949A3"/>
  <path d="M18 2 L18 8 L24 8" fill="none" stroke="#7986CB" stroke-width="0.8"/>
  <!-- Ruled lines -->
  <line x1="8" y1="14" x2="20" y2="14" stroke="white" stroke-width="1.2"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="18" x2="20" y2="18" stroke="white" stroke-width="1.2"
        stroke-linecap="round" opacity="0.7"/>
  <line x1="8" y1="22" x2="16" y2="22" stroke="white" stroke-width="1.2"
        stroke-linecap="round" opacity="0.5"/>
  <!-- Polaris star (4-point) top-left of page -->
  <g transform="translate(9,8)" fill="white">
    <polygon points="0,-3.5 0.7,-0.7 3.5,0 0.7,0.7 0,3.5 -0.7,0.7 -3.5,0 -0.7,-0.7"
             opacity="0.95"/>
  </g>
  <!-- Binding strip on left -->
  <rect x="4" y="2" width="3" height="26" rx="2" ry="2"
        fill="#3949A3" opacity="0.6"/>
</svg>
