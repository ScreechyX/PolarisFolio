<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy circle background -->
  <circle cx="16" cy="16" r="16" fill="#0D1120"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#B8923A" stroke-width="0.7" opacity="0.5"/>
  <!-- 8-point star: 4 long points (N/S/E/W) + 4 short diagonal points -->
  <g transform="translate(16,16)" fill="#C9A96E">
    <!-- Long vertical -->
    <polygon points="0,-12 1.2,-3 0,-1 -1.2,-3"/>
    <polygon points="0,12 1.2,3 0,1 -1.2,3"/>
    <!-- Long horizontal -->
    <polygon points="-12,0 -3,-1.2 -1,0 -3,1.2"/>
    <polygon points="12,0 3,-1.2 1,0 3,1.2"/>
    <!-- Short diagonal points -->
    <polygon points="-6.5,-6.5 -1.8,-2.2 -0.8,-0.8 -2.2,-1.8"/>
    <polygon points="6.5,-6.5 1.8,-2.2 0.8,-0.8 2.2,-1.8"/>
    <polygon points="-6.5,6.5 -1.8,2.2 -0.8,0.8 -2.2,1.8"/>
    <polygon points="6.5,6.5 1.8,2.2 0.8,0.8 2.2,1.8"/>
    <!-- Centre glow dot -->
    <circle cx="0" cy="0" r="1.4" fill="#F0E6CC"/>
  </g>
</svg>
