<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PolarisFolio{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:     #F4F1EA;
      --ink:       #1C1F2E;
      --ink-2:     #3D4260;
      --ink-3:     #8A90A8;
      --rule:      #DDD9CE;
      --sidebar:   #0D1120;
      --sidebar-2: #161C30;
      --accent:    #B8923A;
      --accent-bg: #F5EDD6;
      --success:   #4CAF50;
      --warn:      #C9933A;
      --danger:    #C0392B;
      --radius:    6px;
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'DM Mono', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--paper);
      color: var(--ink);
      display: flex;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      transition: width 0.22s ease;
      overflow: hidden;
      z-index: 100;
    }

    .sidebar.collapsed { width: 52px; }

    .sidebar-logo {
      padding: 16px 14px;
      border-bottom: 1px solid var(--sidebar-2);
      display: flex;
      align-items: center;
      gap: 12px;
      /* No min-width — must shrink with the sidebar */
    }

    .collapse-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #4A5270;
      padding: 5px;
      border-radius: 4px;
      flex-shrink: 0;           /* always visible — it's the leftmost element */
      display: flex;
      align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .collapse-btn:hover { color: #C9A96E; background: var(--sidebar-2); }
    .collapse-btn svg { width: 16px; height: 16px; display: block; }

    .sidebar-wordmark { overflow: hidden; white-space: nowrap; }

    .sidebar-wordmark .wordmark {
      font-size: 16px;
      font-weight: 600;
      color: #F0E6CC;
      letter-spacing: -0.3px;
    }

    .sidebar-wordmark .tagline {
      font-size: 11px;
      color: #4A5270;
      margin-top: 2px;
      font-family: var(--mono);
    }

    .sidebar-nav {
      padding: 12px 8px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      color: #5A6180;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .nav-item:hover { background: var(--sidebar-2); color: #C9A96E; }
    .nav-item.active { background: rgba(185,146,58,0.18); color: #C9A96E; border-left: 2px solid #C9A96E; padding-left: 10px; }

    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-label { transition: opacity 0.15s; }

    .sidebar.collapsed .sidebar-nav { padding-left: 0; padding-right: 0; }
    .sidebar.collapsed .nav-item { justify-content: center; padding: 9px; gap: 0; }
    .sidebar.collapsed .nav-label { opacity: 0; width: 0; overflow: hidden; }

    .sidebar-footer {
      padding: 14px;
      border-top: 1px solid var(--sidebar-2);
      font-size: 11px;
      color: #3A4060;
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
    }

    /* Main content */
    .main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin-left 0.22s ease;
    }

    .main.sidebar-collapsed { margin-left: 52px; }

    .page-header {
      padding: 32px 40px 0;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.4px;
      color: var(--ink);
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--ink-3);
      margin-top: 3px;
    }

    .page-body {
      padding: 32px 40px;
      flex: 1;
    }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 24px;
    }

    .card + .card { margin-top: 16px; }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 16px;
    }

    /* Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    /* Status badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 100px;
      font-size: 11.5px;
      font-weight: 500;
      font-family: var(--mono);
    }

    .badge-green  { background: #E8F5E9; color: #2E7D32; }
    .badge-red    { background: #FFEBEE; color: #C62828; }
    .badge-grey   { background: #F5F5F5; color: #666; }
    .badge-blue   { background: var(--accent-bg); color: var(--accent); }
    .badge-orange { background: #FFF3E0; color: #E65100; }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      display: inline-block;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13.5px;
      font-weight: 500;
      font-family: var(--font);
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:hover { opacity: 0.88; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #fff; color: var(--ink-2); border: 1px solid var(--rule); }
    .btn-danger { background: #FFEBEE; color: var(--danger); border: 1px solid #FFCDD2; }
    .btn-sm { padding: 5px 11px; font-size: 12.5px; }

    /* Forms */
    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-2);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="url"],
    input[type="date"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 13.5px;
      color: var(--ink);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    input[type="checkbox"] { width: auto; }

    .form-hint {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 5px;
      font-family: var(--mono);
    }

    /* Alerts */
    .alert {
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-success { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
    .alert-error   { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
    .alert-info    { background: var(--accent-bg); color: var(--accent); border: 1px solid #C5CAE9; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--rule);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--rule);
      font-size: 13.5px;
      color: var(--ink-2);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFAF8; }

    .mono { font-family: var(--mono); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--rule);
      margin: 24px 0;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--ink-3);
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    .empty-body { font-size: 13px; }

    /* Connection status strip */
    .status-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--rule);
      background: #fff;
      margin-bottom: 12px;
    }

    .status-strip-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-icon {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .status-name { font-size: 13.5px; font-weight: 500; }
    .status-detail { font-size: 12px; color: var(--ink-3); font-family: var(--mono); }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <button class="collapse-btn" id="collapseBtn" title="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="sidebar-wordmark">
      <div class="wordmark">PolarisFolio</div>
      <div class="tagline">paper-first planner</div>
    </div>
  </div>

  <div class="sidebar-nav">
    <a href="/" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="nav-label">Dashboard</span>
    </a>
    <a href="/calendars" class="nav-item {% if active == 'calendars' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="nav-label">Calendars</span>
    </a>
    <a href="/generate" class="nav-item {% if active == 'generate' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
      <span class="nav-label">Generate</span>
    </a>
    <a href="/history" class="nav-item {% if active == 'history' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span class="nav-label">History</span>
    </a>
    <a href="/settings" class="nav-item {% if active == 'settings' %}active{% endif %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      </svg>
      <span class="nav-label">Settings</span>
    </a>
  </div>

  <div class="sidebar-footer">
    v1.0 &mdash; self-hosted
  </div>
</nav>

<main class="main" id="main">
  {% block content %}{% endblock %}
</main>

<script>
  const sidebar = document.getElementById('sidebar');
  const main    = document.getElementById('main');
  const btn     = document.getElementById('collapseBtn');
  const KEY     = 'sidebar-collapsed';

  function setCollapsed(on) {
    sidebar.classList.toggle('collapsed', on);
    main.classList.toggle('sidebar-collapsed', on);
    localStorage.setItem(KEY, on ? '1' : '');
  }

  // Restore saved state
  setCollapsed(!!localStorage.getItem(KEY));

  btn.addEventListener('click', () => setCollapsed(!sidebar.classList.contains('collapsed')));
</script>
</body>
</html>
